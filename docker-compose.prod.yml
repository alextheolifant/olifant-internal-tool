services:
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SP_API_APPLICATION_ID: ${SP_API_APPLICATION_ID}
      SP_API_CLIENT_ID: ${SP_API_CLIENT_ID}
      SP_API_CLIENT_SECRET: ${SP_API_CLIENT_SECRET}
      SP_TOKEN_ENCRYPTION_KEY: ${SP_TOKEN_ENCRYPTION_KEY}
      WEB_APP_URL: "https://app.olifantdigital.com"
    ports: ["3001:3001"]

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: "http://api:3001"
    ports: ["3000:3000"]

name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
  ECS_CLUSTER: olifant-prod

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $ECR_REGISTRY

      # ── Web (Next.js) ─────────────────────────────────────────────────────────
      - name: Build and push web
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t $ECR_REGISTRY/olifant/web:${{ github.sha }} \
            -t $ECR_REGISTRY/olifant/web:latest \
            .
          docker push $ECR_REGISTRY/olifant/web:${{ github.sha }}
          docker push $ECR_REGISTRY/olifant/web:latest

      # ── API (NestJS) ──────────────────────────────────────────────────────────
      - name: Build and push api
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t $ECR_REGISTRY/olifant/api:${{ github.sha }} \
            -t $ECR_REGISTRY/olifant/api:latest \
            .
          docker push $ECR_REGISTRY/olifant/api:${{ github.sha }}
          docker push $ECR_REGISTRY/olifant/api:latest

      # ── Go sync worker ────────────────────────────────────────────────────────
      - name: Build and push sync-ads-api
        run: |
          docker build \
            -f services/sync-ads-api/Dockerfile \
            -t $ECR_REGISTRY/olifant/sync-ads-api:${{ github.sha }} \
            -t $ECR_REGISTRY/olifant/sync-ads-api:latest \
            services/sync-ads-api/
          docker push $ECR_REGISTRY/olifant/sync-ads-api:${{ github.sha }}
          docker push $ECR_REGISTRY/olifant/sync-ads-api:latest

      # ── Deploy to ECS ─────────────────────────────────────────────────────────
      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service olifant-web --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service olifant-api --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service olifant-sync-ads-api --force-new-deployment

      - name: Wait for deployments to stabilise
        run: |
          aws ecs wait services-stable --cluster $ECS_CLUSTER \
            --services olifant-web olifant-api olifant-sync-ads-api
